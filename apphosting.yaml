# apphosting.yaml
# Configuration for Firebase App Hosting (modern framework hosting)
# Learn more: https://firebase.google.com/docs/app-hosting

runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  # Next.js client-side variables (must start with NEXT_PUBLIC_)
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "nexuswire-app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "nexuswire-app.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "nexuswire-app.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyATaqi_uATA6OcZYz3KbiYBHth1uuen9jU"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:808169593942:web:4c8997e0234f6c4c242ff7"
    availability:
      - BUILD
      - RUNTIME

  # Next.js server-side variables
  - variable: FIREBASE_PROJECT_ID
    value: "nexuswire-app"
    availability:
      - RUNTIME
  - variable: FIREBASE_APP_HOSTING
    value: "1"
    availability:
      - RUNTIME
