# apphosting.yaml
# Configuration for Firebase App Hosting (modern framework hosting)
# Learn more: https://firebase.google.com/docs/app-hosting

runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  # Next.js client-side variables (must start with NEXT_PUBLIC_)
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "nexuswire-app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "nexuswire-app.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "nexuswire-app.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME

  # Next.js server-side variables
  - variable: FIREBASE_PROJECT_ID
    value: "nexuswire-app"
    availability:
      - RUNTIME

  # Sensitive variables mapped from Google Cloud Secret Manager
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - RUNTIME
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME
