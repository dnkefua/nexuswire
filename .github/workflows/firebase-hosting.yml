name: Build Verification

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: nexuswire-app
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: nexuswire-app.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyATaqi_uATA6OcZYz3KbiYBHth1uuen9jU"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:808169593942:web:4c8997e0234f6c4c242ff7"
          FIREBASE_PROJECT_ID: nexuswire-app

