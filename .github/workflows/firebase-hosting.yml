name: Deploy to Firebase Hosting

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: nexuswire-app
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: nexuswire-app.firebaseapp.com
          FIREBASE_PROJECT_ID: nexuswire-app
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project nexuswire-app
